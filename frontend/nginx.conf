server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. API-Anfragen an das Python-Backend im Docker-Netzwerk weiterleiten
    location /api/ {
        # 'backend' ist der Name des Services aus deiner docker-compose.yml
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. SPA-Fallback für React/Vite (damit direkte Seitenaufrufe funktionieren)
    location / {
        try_files $uri $uri/ /index.html;
    }
}